# Model / feature-extractor configuration
clip:
  backbone: ViT-L-14          # open_clip model name
  pretrained: openai          # open_clip pretrained tag
  feature_dim: 768

resnet:
  backbone: resnet50
  weights: IMAGENET1K_V2      # torchvision weights enum
  feature_dim: 2048

probe:
  type: logistic_regression   # sklearn LogisticRegression on cached features
  max_iter: 1000
  C: 1.0

finetune_resnet:              # C2 extension
  epochs: 5
  lr: 0.0001
  batch_size: 64
  early_stopping_patience: 2
